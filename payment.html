<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwimMetrics — Train Smarter. Race Faster.</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.png" />
    <meta name="description" content="Elite swim split analysis, accurate course conversions, and performance projections powered by real data from Olympics, World Championships, and NCAA.">
    <meta name="theme-color" content="#0ea5e9">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>

    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        primary: '#0ea5e9',
                        navy: '#0f172a',
                        ocean: '#1e40af',
                    }
                }
            }
        }
    </script>

    <style>
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
        .float { animation: float 7s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        
        .app-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(14 165 233 / 0.25);
        }
        .hero-height {
            min-height: calc(100vh-100px)
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-10 rounded-2xl flex items-center justify-center text-3xl">
                    <a href="index.html"><image src="images/logo1.png" class="h-12" alt="SwimMetrics Logo"/></a>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm">
                <a href="index.html#home" class="hover:text-sky-400 transition">Home</a>
                <a href="#features" class="hover:text-sky-400 transition">Features</a>
                <a href="#gallery" class="hover:text-sky-400 transition">App Gallery</a>
                <a href="#faq" class="hover:text-sky-400 transition">FAQ</a>
                <a href="#about" class="hover:text-sky-400 transition">About</a>
            </div>
            <a href="#contact" 
               class="bg-sky-500 hover:bg-sky-600 px-6 py-3 rounded-2xl font-medium transition">
                Contact Us
            </a>
        </div>
    </nav>

    <!-- SwimMetrics Custom Stripe Payment -->
    <section class="max-w-md mx-auto rounded-3xl shadow-2xl overflow-hidden my-10 border border-gray-100 mt-24 px-2">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-cyan-500 px-6 py-8 text-white text-center">
        <h2 class="text-3xl font-bold">Upgrade to Pro</h2>
        <p class="text-blue-100 mt-2">Unlock all features • One-time payment</p>
        <div class="mt-4">
        <span id="price" class="text-5xl font-bold">$29.99</span>
        <span class="text-sm align-super ml-1">USD</span>
        </div>
    </div>

    <div class="p-6 space-y-6">
        
        <!-- Express Pay -->
        <div class="space-y-3">
        <button id="google-pay" 
            class="w-full bg-black hover:bg-gray-900 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-3 transition">
            <span class="text-xl">G</span> Pay with Google Pay
        </button>
        
        <button id="apple-pay" 
            class="w-full bg-black hover:bg-gray-900 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-3 transition">
            <span class="text-2xl"></span> Pay with Apple Pay
        </button>
        </div>

        <div class="relative flex items-center gap-4">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-sm font-medium">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Card Payment Form -->
        <form id="payment-form" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
            <input type="email" id="email" 
            class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900"
            placeholder="you@example.com" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Card Details</label>
            <div id="card-element" 
            class="border border-gray-300 rounded-2xl p-4 min-h-[56px] focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500">
            </div>
            <div id="card-errors" class="mt-2 text-red-500 text-sm"></div>
        </div>

        <button type="submit" id="submit-button"
            class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 transition-all text-white font-semibold py-4 rounded-2xl text-lg shadow-lg">
            Pay $29.99 Securely
        </button>
        </form>

        <p class="text-center text-xs text-gray-500 pt-2">
        Secured by Stripe • 256-bit SSL • Cancel anytime
        </p>
    </div>
    </section>

    <script>
        // Tailwind Script (if not already initialized)
        tailwind.config = { content: [] }

        // Replace with your Stripe Publishable Key
        const stripe = Stripe('pk_live_XXXXXXXXXXXXXXXXXXXXXXXX'); 

        let elements, cardElement;

        async function initializePayment() {
        const response = await fetch('https://api.swimmetricsapp.com/plan/create-checkout-session/', {
            method: 'POST',
            headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('access_token')}` // or your auth method
            }
        });

        const { checkout_url } = await response.json();
        
        // For full custom control, we recommend switching to PaymentIntent later.
        // For now, redirect to Stripe Checkout (safest with your current backend)
        if (checkout_url) {
            window.location.href = checkout_url;
        }
        }

        // Optional: Full custom Payment Element (Advanced)
        async function loadPaymentElement() {
        const { clientSecret } = await fetch('/create-payment-intent/', { method: 'POST' }).then(r => r.json());

        elements = stripe.elements({ clientSecret });
        cardElement = elements.create('card', {
            style: {
            base: { fontSize: '16px', color: '#1f2937' }
            }
        });
        cardElement.mount('#card-element');
        }

        // Form Submit (for custom element - currently redirecting to match your backend)
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-button');
        btn.disabled = true;
        btn.textContent = "Processing...";

        // Using your existing backend (Checkout Session)
        await initializePayment();
        });
    </script>

</body>
</html>
